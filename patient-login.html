<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Patient Login - Circle of Life Hospital</title>
  <link rel="icon" type="image/png" href="favicon-32x32.png"> 
  <link rel="stylesheet" href="style.css"/>
  <script>const t=localStorage.getItem('theme')
  'light';document.documentElement.setAttribute('data-theme',t);
  </script>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-logo">
    <div class="logo-icon"></div>
    <span class="logo-text">Circle of <span>Life</span></span>
  </a>
  <button class="theme-toggle" id="themeToggle" title="Toggle theme">Light Mode</button>
</nav>

<div class="login-container">
  <div class="login-card">
    <h1>Patient Portal</h1>
    <br>
    <h2>Welcome Back</h2>

    <p class="subtitle">Sign in to access your health records and appointments.</p>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@colh.com" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="*******" autocomplete="current-password"/>
    </div>

    <button class="btn btn-primary patient" id="loginBtn"style="width:100%;">Sign In</button>

    <p class="error-msg" id="errorMsg"></p>
    <a href="index.html" class="back-link"> ← Back to Portal Selection</a>
  </div>
</div>
<script type="module" src="./script.js"></script>
</body>
</html>
