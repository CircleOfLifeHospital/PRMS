<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Circle of Life Hospital</title>
  <link rel="stylesheet" href="style.css"/>
  <script>const t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);</script>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-logo"><div class="logo-icon"></div><span class="logo-text">Circle of <span>Life</span></span></a>
  <button class="theme-toggle" id="themeToggle">Dark Mode</button>
</nav>
<div class="login-container">
  <div class="login-card">
    <h2>Admin Sign In</h2>
    <p class="subtitle">Access the hospital administration and oversight dashboard.</p>
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="admin@colh.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="********" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary admin" id="loginBtn" style="width:100%;">Sign In</button>
    <p class="error-msg" id="errorMsg"></p>
    <a href="index.html" class="back-link">← Back to Portal Selection</a>
  </div>
</div>
<script type="module" src="./script.js"></script>
</body>
</html>
