<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nurse Login — Circle of Life Hospital</title>
  <link rel="stylesheet" href="style.css"/>
  <script>const t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);</script>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-logo"><div class="logo-icon">🏥</div><span class="logo-text">Circle of <span>Life</span></span></a>
  <button class="theme-toggle" id="themeToggle">🌙</button>
</nav>
<div class="login-container">
  <div class="login-card">
    <span class="login-role-badge" style="background:rgba(0,150,136,0.1);color:#009688;">💉 &nbsp; Nurse Portal</span>
    <h2>Staff Sign In</h2>
    <p class="subtitle">Access the nursing care management dashboard.</p>
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="nurse@colh.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary nurse" id="loginBtn" style="width:100%;">Sign In</button>
    <div style="display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text-muted);font-size:.85rem;">
      <div style="flex:1;height:1px;background:var(--border);"></div>or<div style="flex:1;height:1px;background:var(--border);"></div>
    </div>
    <button class="btn" id="googleBtn" style="width:100%;background:var(--surface);border:1px solid var(--border);gap:10px;">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <p class="error-msg" id="errorMsg"></p>
    <a href="index.html" class="back-link">← Back to Portal Selection</a>
  </div>
</div>
<script type="module" src="./script.js"></script>
</body>
</html>
